# ═══════════════════════════════════════════════════════════════
# Docker Compose EXEMPLE — C.G Boutique E-commerce
# ⚠️  Copie ce fichier et renomme-le docker-compose.yml
#     puis remplace les valeurs YOUR_* par tes vraies valeurs
# Auteur : Gheorghina Costincianu
# ═══════════════════════════════════════════════════════════════

# Comment utiliser :
# cp docker-compose.example.yml docker-compose.yml
# Puis modifie docker-compose.yml avec tes vraies valeurs

services:

  # ──────────────────────────────────────────────────────────────
  # CONTENEUR 1 — NGINX (Serveur Web)
  # Reçoit les requêtes HTTP et les transmet à PHP
  # Accessible sur http://localhost:8080
  # ──────────────────────────────────────────────────────────────
  nginx:
    # Image officielle Nginx légère basée sur Alpine Linux
    image: nginx:alpine
    # Nom du conteneur dans Docker
    container_name: cg_nginx
    ports:
      # Port 8080 de ta machine → Port 80 du conteneur
      - "8080:80"
    volumes:
      # Monte ton projet dans le conteneur
      - .:/var/www/html
      # Monte la configuration Nginx personnalisée
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      # Nginx démarre seulement après PHP
      - php
    networks:
      # Connecté au réseau interne Docker
      - cg_network

  # ──────────────────────────────────────────────────────────────
  # CONTENEUR 2 — PHP 8.2 FPM (Application Symfony)
  # Exécute le code PHP de ton application Symfony
  # Construit depuis le Dockerfile personnalisé
  # ──────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────────
  # ENTRYPOINT — Script de démarrage du conteneur PHP
  # Exécuté automatiquement à chaque démarrage du conteneur
  #
  # 1. Crée le dossier asset_mapper si il n'existe pas
  #    (nécessaire pour Symfony Asset Mapper en prod)
  # 2. Crée le dossier log si il n'existe pas
  # 3. Donne les permissions 777 sur var/ (1ère fois)
  # 4. Donne l'ownership à www-data (utilisateur Nginx/PHP)
  # 5. Attend 2 secondes que le volume Windows soit monté
  # 6. Refix les permissions après montage du volume
  # 7. Refix l'ownership après montage du volume
  # 8. Lance PHP-FPM (serveur PHP)
  # ──────────────────────────────────────────────────────────────
  php:
    build:
      # Dossier racine du projet comme contexte de build
      context: .
      # Fichier Dockerfile à utiliser pour construire l'image
      dockerfile: docker/php/Dockerfile
    # Nom du conteneur dans Docker
    container_name: cg_php
    # Charge les variables depuis ton fichier .env.docker (non commité)
    env_file:
      - .env.docker
    entrypoint: >
      sh -c "mkdir -p /var/www/html/var/cache/prod/asset_mapper &&
            mkdir -p /var/www/html/var/log &&
            chmod -R 777 /var/www/html/var &&
            chown -R www-data:www-data /var/www/html/var &&
            sleep 2 &&
            chmod -R 777 /var/www/html/var &&
            chown -R www-data:www-data /var/www/html/var &&
            php-fpm"
    volumes:
      - .:/var/www/html
      - /dev/null:/var/www/html/.env.local
    environment:
      - APP_ENV=prod
      # ⚠️ Remplace ces valeurs par tes vraies valeurs dans docker-compose.yml
      - APP_SECRET=YOUR_APP_SECRET_32CHARS_MIN
      - DATABASE_URL=mysql://YOUR_DB_USER:YOUR_DB_PASSWORD@mysql:3306/ecommerce_cg?serverVersion=8.0
      - MAILER_DSN=YOUR_MAILER_DSN
      - MESSENGER_TRANSPORT_DSN=doctrine://default?auto_setup=0
    depends_on:
      # PHP démarre seulement après MySQL
      - mysql
    networks:
      - cg_network

  # ──────────────────────────────────────────────────────────────
  # CONTENEUR 3 — MySQL 8.0 (Base de données)
  # Stocke toutes les données de la boutique
  # Accessible sur le port 3307 de ta machine
  # ──────────────────────────────────────────────────────────────
  mysql:
    # Image officielle MySQL version 8.0
    image: mysql:8.0
    # Nom du conteneur dans Docker
    container_name: cg_mysql
    environment:
      # ⚠️ Remplace ces valeurs par tes vrais mots de passe
      MYSQL_ROOT_PASSWORD: YOUR_ROOT_PASSWORD
      # Nom de la base de données créée automatiquement
      MYSQL_DATABASE: ecommerce_cg
      # Utilisateur créé automatiquement pour l'application
      MYSQL_USER: YOUR_DB_USER
      # Mot de passe de l'utilisateur applicatif
      MYSQL_PASSWORD: YOUR_DB_PASSWORD
    ports:
      # Port 3307 de ta machine → Port 3306 du conteneur
      # On utilise 3307 pour éviter le conflit avec ton MySQL local
      - "3307:3306"
    volumes:
      # Volume persistant pour conserver les données même si le conteneur redémarre
      - cg_mysql_data:/var/lib/mysql
    networks:
      - cg_network

  # ──────────────────────────────────────────────────────────────
  # CONTENEUR 4 — PhpMyAdmin (Interface graphique BDD)
  # Permet de gérer la BDD via navigateur
  # Accessible sur http://localhost:8081
  # ──────────────────────────────────────────────────────────────
  phpmyadmin:
    # Image officielle PhpMyAdmin
    image: phpmyadmin:latest
    # Nom du conteneur dans Docker
    container_name: cg_phpmyadmin
    ports:
      # Port 8081 de ta machine → Port 80 du conteneur
      - "8081:80"
    environment:
      # Adresse du serveur MySQL (nom du service Docker)
      PMA_HOST: mysql
      # ⚠️ Remplace ces valeurs par tes vrais identifiants
      PMA_USER: YOUR_DB_USER
      PMA_PASSWORD: YOUR_DB_PASSWORD
    depends_on:
      # PhpMyAdmin démarre seulement après MySQL
      - mysql
    networks:
      - cg_network

# ──────────────────────────────────────────────────────────────
# VOLUMES — Stockage persistant
# Les données MySQL survivent aux redémarrages des conteneurs
# ──────────────────────────────────────────────────────────────
volumes:
  cg_mysql_data:

# ──────────────────────────────────────────────────────────────
# RÉSEAU — Communication entre conteneurs
# Tous les conteneurs communiquent via ce réseau interne
# ──────────────────────────────────────────────────────────────
networks:
  cg_network:
    driver: bridge