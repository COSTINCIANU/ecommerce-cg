# ═══════════════════════════════════════════════════════════════
# docker-compose.staging.example.yml — C.G Boutique
# ⚠️  Copie ce fichier et renomme-le docker-compose.staging.yml
#     puis remplace les valeurs YOUR_* par tes vraies valeurs
# Environnement STAGING pour tests OWASP ZAP
# Lance avec : docker compose -f docker-compose.staging.yml up -d
# ═══════════════════════════════════════════════════════════════

# Comment utiliser :
# cp docker-compose.staging.example.yml docker-compose.staging.yml
# Puis modifie docker-compose.staging.yml avec tes vraies valeurs

services:

  # ── Serveur Web Nginx ──
  # Même config que la prod, mais port différent (8090)
  nginx:
    image: nginx:alpine
    container_name: cg_nginx_staging
    ports:
      - "8090:80"   # Port 8090 pour ne pas avoir des conflict avec ma prod (8080)
    volumes:
      - .:/var/www/html
      - ./docker/nginx/staging.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php_staging
    networks:
      - cg_staging_network

  # ── PHP 8.2 FPM ──
  php_staging:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cg_php_staging
    entrypoint: >
      sh -c "mkdir -p /var/www/html/var/cache/prod/asset_mapper &&
            chown -R www-data:www-data /var/www/html/var &&
            chmod -R 777 /var/www/html/var &&
            php-fpm"
    volumes:
      - .:/var/www/html
    environment:
      # Mode test — pas de prod !
      APP_ENV: prod
      APP_DEBUG: "0"
      # ⚠️ Remplace par une vraie clé de 32 caractères minimum
      APP_SECRET: YOUR_STAGING_SECRET_32CHARS_MIN
      # Base de données SÉPARÉE de la prod
      DATABASE_URL: "mysql://YOUR_DB_USER:YOUR_DB_PASSWORD@mysql_staging:3306/ecommerce_cg_staging"
      # ⚠️ Clés TEST Stripe — commence par sk_test_ (pas de vrai argent !)
      STRIPE_SECRET_KEY: sk_test_YOUR_STRIPE_SECRET_KEY
      STRIPE_PUBLIC_KEY: pk_test_YOUR_STRIPE_PUBLIC_KEY
      STRIPE_WEBHOOK_SECRET: whsec_YOUR_STRIPE_WEBHOOK_SECRET
      # Emails désactivés (aucun mail envoyé pendant les tests ZAP)
      MAILER_DSN: "null://null"
    depends_on:
      - mysql_staging
    networks:
      - cg_staging_network

  # ── MySQL SÉPARÉ ──
  # Base de données de test — indépendante de ma prod
  mysql_staging:
    image: mysql:8.0
    container_name: cg_mysql_staging
    environment:
      # ⚠️ Remplace ces valeurs par tes vrais mots de passe
      MYSQL_ROOT_PASSWORD: YOUR_ROOT_STAGING_PASSWORD
      MYSQL_DATABASE: ecommerce_cg_staging   # Nom différent de la prod !
      MYSQL_USER: YOUR_DB_USER
      MYSQL_PASSWORD: YOUR_DB_PASSWORD
    volumes:
      # Données de test dans un volume séparé
      - mysql_staging_data:/var/lib/mysql
      # Importe ma BDD de test au démarrage
      - ./ecommerce-cg.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cg_staging_network

  # ── phpMyAdmin pour vérifier la BDD de test ──
  phpmyadmin_staging:
    image: phpmyadmin:latest
    container_name: cg_phpmyadmin_staging
    ports:
      - "8091:80"   # http://localhost:8091
    environment:
      PMA_HOST: mysql_staging
      # ⚠️ Remplace ces valeurs par tes vrais identifiants
      PMA_USER: YOUR_DB_USER
      PMA_PASSWORD: YOUR_DB_PASSWORD
    depends_on:
      - mysql_staging
    networks:
      - cg_staging_network

volumes:
  mysql_staging_data:   # Volume isolé — je ne touche pas à la prod

networks:
  cg_staging_network:   # Réseau isolé — séparé de la prod
    driver: bridge