server {
    listen 80;
    server_name localhost;

    # Cache la version de Nginx
    server_tokens off;

    # Cache la version de PHP
    fastcgi_hide_header X-Powered-By;

    # Anti-clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;" always;

    # Protection sniffing MIME
    add_header X-Content-Type-Options "nosniff" always;

    # Filtre XSS navigateur
    add_header X-XSS-Protection "1; mode=block" always;

    root /var/www/html/public;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        # PHP-FPM du conteneur staging
        fastcgi_pass php_staging:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}