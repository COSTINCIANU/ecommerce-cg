# ═══════════════════════════════════════════════════════════════
# Configuration Nginx pour Symfony 7.4
# Auteur : Gheorghina Costincianu
# ═══════════════════════════════════════════════════════════════

server {
    # ──────────────────────────────────────────────────────────
    # Port d'écoute HTTP
    # ──────────────────────────────────────────────────────────
    listen 80;

    # Nom du serveur (localhost en développement)
    server_name localhost;

    # ──────────────────────────────────────────────────────────
    # Sécurité — Headers HTTP
    # ──────────────────────────────────────────────────────────
    
    # Cache la version de Nginx dans les réponses HTTP
    server_tokens off;
    
    # Cache la version de PHP dans les headers
    fastcgi_hide_header X-Powered-By;
    
    # Anti-clickjacking — empêche le site d'être intégré dans une iframe
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Content Security Policy — définit les sources autorisées
    # default-src 'self' → uniquement les ressources du même domaine
    # script-src 'unsafe-inline' 'unsafe-eval' → autorise les scripts inline (Bootstrap, jQuery)
    # style-src 'unsafe-inline' → autorise les styles inline
    # img-src data: → autorise les images en base64
    # font-src data: → autorise les polices en base64
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;" always;
    
    # Empêche le navigateur de deviner le type MIME (protection sniffing)
    add_header X-Content-Type-Options "nosniff" always;
    
    # Active le filtre XSS du navigateur
    add_header X-XSS-Protection "1; mode=block" always;

    # ──────────────────────────────────────────────────────────
    # Dossier racine public de Symfony
    # Tous les fichiers publics (CSS, JS, images) sont ici
    # ──────────────────────────────────────────────────────────
    root /var/www/html/public;

    # ──────────────────────────────────────────────────────────
    # Règle principale — toutes les URLs
    # Essaie de servir le fichier directement,
    # sinon redirige vers index.php (front controller Symfony)
    # ──────────────────────────────────────────────────────────
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # ──────────────────────────────────────────────────────────
    # Traitement des fichiers PHP via PHP-FPM
    # Nginx envoie les requêtes PHP au conteneur php:9000
    # ──────────────────────────────────────────────────────────
    location ~ ^/index\.php(/|$) {
        # Adresse du conteneur PHP-FPM (nom du service Docker)
        fastcgi_pass php:9000;

        # Sépare le chemin du script PHP et le path info
        fastcgi_split_path_info ^(.+\.php)(/.*)$;

        # Paramètres FastCGI standards
        include fastcgi_params;

        # Chemin absolu vers le script PHP
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;

        # Dossier racine du document
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Seul index.php peut être accédé directement
        internal;
    }

    # ──────────────────────────────────────────────────────────
    # Sécurité — Bloque l'accès direct aux autres fichiers PHP
    # Empêche l'exécution de fichiers PHP malveillants uploadés
    # ──────────────────────────────────────────────────────────
    location ~ \.php$ {
        return 404;
    }

    # ──────────────────────────────────────────────────────────
    # Logs Nginx pour le débogage
    # ──────────────────────────────────────────────────────────
    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}